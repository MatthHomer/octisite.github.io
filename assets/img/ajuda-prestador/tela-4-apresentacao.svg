<svg viewBox="0 0 340 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="hdrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6b49"/>
      <stop offset="100%" stop-color="#163f2c"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34a06c"/>
      <stop offset="100%" stop-color="#2d8a5a"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="336" height="696" rx="46" fill="#111113"/>
  <rect x="10" y="10" width="320" height="680" rx="38" fill="#FFFFFF"/>
  <clipPath id="screenClip"><rect x="10" y="10" width="320" height="680" rx="38"/></clipPath>

  <g clip-path="url(#screenClip)">
    <rect x="10" y="10" width="320" height="118" fill="url(#hdrGrad)"/>
    <text x="44" y="38" font-size="13" font-weight="600" fill="#FFFFFF">9:41</text>
    <rect x="130" y="10" width="80" height="22" rx="11" fill="#0c2419"/>
    <circle cx="40" cy="68" r="15" fill="#ffffff" opacity="0.12"/>
    <text x="40" y="73" text-anchor="middle" font-size="15" fill="#FFFFFF">←</text>
    <text x="64" y="74" font-size="15" font-weight="700" fill="#FFFFFF">Sua apresentação</text>
    <g>
      <rect x="24" y="100" width="62" height="4" rx="2" fill="#FFFFFF"/>
      <rect x="92" y="100" width="62" height="4" rx="2" fill="#FFFFFF"/>
      <rect x="160" y="100" width="62" height="4" rx="2" fill="#FFFFFF"/>
      <rect x="228" y="100" width="62" height="4" rx="2" fill="#ffffff" opacity="0.28"/>
    </g>
  </g>

  <text x="24" y="158" font-size="18" font-weight="700" fill="#18181b">Bio &amp; Apresentação</text>

  <circle cx="170" cy="206" r="40" fill="#e5e5e5" filter="url(#cardShadow)"/>
  <text x="170" y="214" text-anchor="middle" font-size="22">📷</text>
  <circle cx="198" cy="232" r="13" fill="url(#btnGrad)" stroke="#FFFFFF" stroke-width="2"/>
  <text x="198" y="237" text-anchor="middle" font-size="11" fill="#FFFFFF">＋</text>
  <text x="170" y="262" text-anchor="middle" font-size="11" fill="#a1a1aa">Toque para adicionar foto</text>

  <g>
    <text x="24" y="290" font-size="11" font-weight="700" fill="#3f3f46">Como você se apresenta? *</text>
    <text x="316" y="290" font-size="9.5" fill="#a1a1aa" text-anchor="end">182/20 min</text>
  </g>
  <rect x="24" y="298" width="292" height="92" rx="12" fill="#fafafa" stroke="#ededee" stroke-width="1.5"/>
  <text x="38" y="320" font-size="12" fill="#18181b">Eletricista com 7 anos de</text>
  <text x="38" y="338" font-size="12" fill="#18181b">experiência, especializado em</text>
  <text x="38" y="356" font-size="12" fill="#18181b">instalações residenciais e</text>
  <text x="38" y="374" font-size="12" fill="#18181b">manutenção preventiva.</text>

  <text x="24" y="416" font-size="11" font-weight="700" fill="#3f3f46">Valor por hora estimado</text>
  <rect x="24" y="424" width="292" height="48" rx="12" fill="#fafafa" stroke="#ededee" stroke-width="1.5"/>
  <line x1="68" y1="424" x2="68" y2="472" stroke="#ededee"/>
  <text x="46" y="453" text-anchor="middle" font-size="14" font-weight="700" fill="#3f3f46">R$</text>
  <text x="84" y="453" font-size="14" fill="#18181b">150,00</text>

  <rect x="24" y="490" width="292" height="38" rx="12" fill="#e8f5ee"/>
  <text x="40" y="513" font-size="10.5" font-weight="600" fill="#1a5c40">ℹ️ Você pode editar essas informações depois.</text>

  <rect x="24" y="618" width="292" height="48" rx="14" fill="url(#btnGrad)" filter="url(#cardShadow)"/>
  <text x="170" y="647" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Próximo →</text>
  <rect x="130" y="678" width="80" height="5" rx="2.5" fill="#18181b" opacity="0.2"/>
</svg>
