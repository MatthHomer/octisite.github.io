    <rect x="124" y="204" width="92" height="76" rx="14" fill="#FFFFFF" stroke="#ededee" stroke-width="1.5" filter="url(#cardShadow)"/>
    <circle cx="170" cy="232" r="16" fill="#fafafa"/>
    <text x="170" y="238" text-anchor="middle" font-size="17">🎨</text>
    <text x="170" y="264" text-anchor="middle" fill="#3f3f46">Pintura</text>

