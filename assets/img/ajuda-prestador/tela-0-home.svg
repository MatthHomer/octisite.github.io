<svg viewBox="0 0 340 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="hdrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6b49"/>
      <stop offset="100%" stop-color="#163f2c"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="336" height="696" rx="46" fill="#111113"/>
  <rect x="10" y="10" width="320" height="680" rx="38" fill="#FFFFFF"/>
  <clipPath id="screenClip"><rect x="10" y="10" width="320" height="680" rx="38"/></clipPath>

  <g clip-path="url(#screenClip)">
    <rect x="10" y="10" width="320" height="118" fill="url(#hdrGrad)"/>
    <text x="44" y="38" font-size="13" font-weight="600" fill="#FFFFFF">9:41</text>
    <rect x="130" y="10" width="80" height="22" rx="11" fill="#0c2419"/>
    <text x="24" y="72" font-size="11" fill="#c6e8d4">Sua localização</text>
    <text x="24" y="90" font-size="14" font-weight="700" fill="#FFFFFF">São Paulo, SP ▾</text>

    <rect x="24" y="104" width="292" height="40" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="38" y="129" font-size="12" fill="#a1a1aa">🔍  Buscar serviço ou profissional</text>
  </g>

  <text x="24" y="168" font-size="13" font-weight="700" fill="#18181b">Categorias</text>
  <g font-size="9.5" font-weight="600">
    <circle cx="46" cy="196" r="24" fill="#e8f5ee"/>
    <text x="46" y="202" text-anchor="middle" font-size="16">⚡</text>
    <text x="46" y="230" text-anchor="middle" fill="#3f3f46">Elétrica</text>

    <circle cx="116" cy="196" r="24" fill="#fff4ed"/>
    <text x="116" y="202" text-anchor="middle" font-size="16">🎨</text>
    <text x="116" y="230" text-anchor="middle" fill="#3f3f46">Pintura</text>

    <circle cx="186" cy="196" r="24" fill="#e8f5ee"/>
    <text x="186" y="202" text-anchor="middle" font-size="16">🚿</text>
    <text x="186" y="230" text-anchor="middle" fill="#3f3f46">Encanamento</text>

    <circle cx="256" cy="196" r="24" fill="#fff4ed"/>
    <text x="256" y="202" text-anchor="middle" font-size="16">🧹</text>
    <text x="256" y="230" text-anchor="middle" fill="#3f3f46">Limpeza</text>
