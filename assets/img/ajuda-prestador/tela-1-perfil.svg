<svg viewBox="0 0 340 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9dd6b4"/>
      <stop offset="100%" stop-color="#2d8a5a"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34a06c"/>
      <stop offset="100%" stop-color="#2d8a5a"/>
    </linearGradient>
  </defs>

  <!-- bezel -->
  <rect x="2" y="2" width="336" height="696" rx="46" fill="#111113"/>
  <rect x="10" y="10" width="320" height="680" rx="38" fill="#FFFFFF"/>

  <!-- status bar -->
  <text x="44" y="38" font-size="13" font-weight="600" fill="#18181b">9:41</text>
  <g fill="#18181b">
    <rect x="266" y="30" width="3" height="6" rx="1"/>
    <rect x="271" y="27" width="3" height="9" rx="1"/>
    <rect x="276" y="24" width="3" height="12" rx="1"/>
    <rect x="288" y="25" width="16" height="10" rx="2" fill="none" stroke="#18181b" stroke-width="1.2"/>
    <rect x="290" y="27" width="11" height="6" rx="1"/>
  </g>
  <!-- notch -->
  <rect x="130" y="10" width="80" height="22" rx="11" fill="#111113"/>

  <!-- header -->
  <text x="170" y="74" text-anchor="middle" font-size="18" font-weight="700" fill="#18181b">Meu Perfil</text>
  <line x1="10" y1="92" x2="330" y2="92" stroke="#f0f0f1" stroke-width="1"/>

  <!-- avatar -->
  <circle cx="170" cy="148" r="42" fill="url(#avatarGrad)"/>
  <circle cx="170" cy="138" r="15" fill="#ffffff" opacity="0.85"/>
  <path d="M145 168 Q170 148 195 168 L195 175 Q170 188 145 175 Z" fill="#ffffff" opacity="0.85"/>
  <text x="170" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#18181b">Carlos Mendes</text>
  <text x="170" y="228" text-anchor="middle" font-size="11" fill="#a1a1aa">carlos.mendes@gmail.com</text>

  <!-- activation card -->
  <rect x="22" y="252" width="296" height="100" rx="16" fill="#e8f5ee" filter="url(#cardShadow)"/>
  <circle cx="58" cy="288" r="18" fill="#fff4ed"/>
  <text x="58" y="295" text-anchor="middle" font-size="16">🔧</text>
  <text x="86" y="284" font-size="13" font-weight="700" fill="#18181b">Quer oferecer seus serviços?</text>
  <text x="86" y="301" font-size="10.5" fill="#52525b">Crie seu perfil e comece a</text>
  <text x="86" y="314" font-size="10.5" fill="#52525b">receber solicitações.</text>
  <rect x="218" y="324" width="80" height="26" rx="13" fill="url(#btnGrad)" filter="url(#cardShadow)"/>
  <text x="258" y="341" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">Ativar agora</text>

  <text x="24" y="392" font-size="10.5" font-weight="700" fill="#a1a1aa" letter-spacing="1">MINHA CONTA</text>
  <rect x="22" y="402" width="296" height="172" rx="14" fill="#FFFFFF" stroke="#ededee" stroke-width="1" filter="url(#cardShadow)"/>
  <line x1="22" y1="445" x2="318" y2="445" stroke="#f4f4f5"/>
  <line x1="22" y1="488" x2="318" y2="488" stroke="#f4f4f5"/>
  <line x1="22" y1="531" x2="318" y2="531" stroke="#f4f4f5"/>
  <text x="40" y="428" font-size="13" fill="#3f3f46">🔔   Notificações</text>
  <text x="296" y="428" text-anchor="end" font-size="13" fill="#c4c4c8">›</text>
  <text x="40" y="471" font-size="13" fill="#3f3f46">🔐   Ativar entrada com biometria</text>
  <text x="296" y="471" text-anchor="end" font-size="13" fill="#c4c4c8">›</text>
  <text x="40" y="514" font-size="13" fill="#3f3f46">❓   Ajuda</text>
  <text x="296" y="514" text-anchor="end" font-size="13" fill="#c4c4c8">›</text>
  <text x="40" y="557" font-size="13" fill="#dc2626">🚪   Sair da conta</text>

  <!-- Tab bar -->
  <line x1="10" y1="616" x2="330" y2="616" stroke="#e5e5e5"/>
  <g font-size="9" font-weight="600">
    <text x="44" y="642" text-anchor="middle" font-size="18" fill="#a1a1aa">⌂</text>
    <text x="44" y="660" text-anchor="middle" fill="#a1a1aa">Início</text>

    <text x="112" y="642" text-anchor="middle" font-size="16" fill="#a1a1aa">🔍</text>
    <text x="112" y="660" text-anchor="middle" fill="#a1a1aa">Buscar</text>

    <text x="180" y="642" text-anchor="middle" font-size="16" fill="#a1a1aa">📁</text>
    <text x="180" y="660" text-anchor="middle" fill="#a1a1aa">Projetos</text>

    <text x="248" y="642" text-anchor="middle" font-size="16" fill="#a1a1aa">💬</text>
    <text x="248" y="660" text-anchor="middle" fill="#a1a1aa">Chat</text>

    <rect x="278" y="624" width="44" height="44" rx="14" fill="#e8f5ee"/>
    <text x="300" y="644" text-anchor="middle" font-size="17" fill="#2d8a5a">👤</text>
    <text x="300" y="660" text-anchor="middle" fill="#2d8a5a" font-weight="700">Perfil</text>
  </g>

  <!-- home indicator -->
  <rect x="130" y="678" width="80" height="5" rx="2.5" fill="#18181b" opacity="0.2"/>
</svg>
