    <circle cx="70" cy="318" r="16" fill="#fafafa"/>
    <text x="70" y="324" text-anchor="middle" font-size="17">🧹</text>
    <text x="70" y="350" text-anchor="middle" fill="#3f3f46">Limpeza</text>

